spring.application.name=CandleDataChart

# ===============================
# Server Config
# ===============================
server.port=9090

# ===============================
# MySQL Database Config
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/candledatachart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / Hibernate Config
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# IMPORTANT: Reserved Keywords (interval) ko handle karne ke liye
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Performance Tuning for Large Batches (19k+ stocks)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true


# Connection Pool Optimization
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# Transaction & Memory Management
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.properties.hibernate.connection.release_mode=after_transaction

